<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Prescription — MedCare HMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar :: doctor('prescriptions')}">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </div>
      <span>MedCare HMS</span>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/doctor/dashboard}" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a th:href="@{/doctor/prescriptions}" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0120 9.414V19a2 2 0 01-2 2z"/></svg>
        Prescriptions
      </a>
      <a th:href="@{/doctor/slots}" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg>
        Time Slots
      </a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin-top:auto;padding:16px;">
      <button type="submit" class="btn btn-ghost" style="width:100%;justify-content:flex-start;gap:10px;color:var(--text-muted);">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </button>
    </form>
 </div>

  <!-- Main Content -->
  <main class="content">
    <div class="content-header">
      <div>
        <h1 class="content-title">
          <span th:if="${existing}">Edit Prescription</span>
          <span th:unless="${existing}">Add Prescription</span>
        </h1>
        <p class="content-subtitle">
          Patient: <strong th:text="${appointment.patient.name}"></strong> &nbsp;|&nbsp;
          Date: <strong th:text="${#temporals.format(appointment.appointmentDate, 'dd MMM yyyy, hh:mm a')}"></strong>
        </p>
      </div>
      <a th:href="@{/doctor/dashboard}" class="btn btn-ghost">← Back</a>
    </div>

    <div class="card" style="max-width:680px;">
      <form th:action="@{/doctor/prescription/save}" method="post">
        <input type="hidden" name="appointmentId" th:value="${appointment.id}"/>

        <!-- Diagnosis -->
        <div class="form-group">
          <label for="diagnosis">Diagnosis</label>
          <textarea id="diagnosis" name="diagnosis" rows="3"
                    placeholder="e.g. Acute Pharyngitis, Viral Fever..."
                    required
                    th:text="${existing != null ? existing.diagnosis : ''}"></textarea>
        </div>

        <!-- Medicines -->
        <div class="form-group">
          <label for="medicines">Medicines &amp; Dosage</label>
          <textarea id="medicines" name="medicines" rows="5"
                    placeholder="e.g.&#10;Paracetamol 500mg — 1 tab twice daily for 5 days&#10;Cetirizine 10mg — 1 tab at night for 3 days"
                    required
                    th:text="${existing != null ? existing.medicines : ''}"></textarea>
          <small style="color:var(--text-muted);font-size:0.78rem;">Enter each medicine on a new line.</small>
        </div>

        <!-- Instructions -->
        <div class="form-group">
          <label for="instructions">Instructions / Advice</label>
          <textarea id="instructions" name="instructions" rows="3"
                    placeholder="e.g. Drink plenty of fluids, rest for 2 days, avoid cold food..."
                    th:text="${existing != null ? existing.instructions : ''}"></textarea>
        </div>

        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="submit" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            Save Prescription
          </button>
          <a th:href="@{/doctor/dashboard}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
</body>
</html>
