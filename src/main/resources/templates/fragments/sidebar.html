<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head><meta charset="UTF-8"/></head>
<body>

<!-- ── ADMIN SIDEBAR ──────────────────────────────────────── -->
<div th:fragment="admin(active)" class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    </div>
    <span class="sidebar-logo-text">MedCare</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Main</div>
    <ul class="sidebar-nav">
      <li>
        <a th:href="@{/admin/dashboard}" th:classappend="${active == 'dashboard'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Manage</div>
    <ul class="sidebar-nav">
      <li>
        <a th:href="@{/admin/dashboard}" th:classappend="${active == 'doctors'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m4-4a4 4 0 100-8 4 4 0 000 8z"/></svg>
          Doctors
        </a>
      </li>
      <li>
        <a th:href="@{/admin/dashboard}" th:classappend="${active == 'patients'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          Patients
        </a>
      </li>
      <li>
        <a th:href="@{/appointments/all}" th:classappend="${active == 'appointments'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Appointments
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">A</div>
      <div class="sidebar-user-info">
        <div class="sidebar-username" sec:authentication="name">Admin</div>
        <div class="sidebar-role">Administrator</div>
      </div>
      <a th:href="@{/logout}" class="sidebar-logout" title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </a>
    </div>
  </div>
</div>

<!-- ── DOCTOR SIDEBAR ─────────────────────────────────────── -->
<div th:fragment="doctor(active)" class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    </div>
    <span class="sidebar-logo-text">MedCare</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Navigation</div>
    <ul class="sidebar-nav">
      <li>
        <a th:href="@{/doctor/dashboard}" th:classappend="${active == 'dashboard'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a th:href="@{/doctor/slots}" th:classappend="${active == 'slots'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          My Time Slots
        </a>
      </li>
<li>
  <a th:href="@{/doctor/prescriptions}" 
     th:classappend="${active == 'prescriptions'} ? ' active' : ''">
    
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" 
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0120 9.414V19a2 2 0 01-2 2z"/>
    </svg>
    
    Prescriptions
  </a>
</li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">D</div>
      <div class="sidebar-user-info">
        <div class="sidebar-username" sec:authentication="name">Doctor</div>
        <div class="sidebar-role">Doctor</div>
      </div>
      <a th:href="@{/logout}" class="sidebar-logout" title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </a>
    </div>
  </div>
</div>

<!-- ── PATIENT SIDEBAR ────────────────────────────────────── -->
<div th:fragment="patient(active)" class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
    </div>
    <span class="sidebar-logo-text">MedCare</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Navigation</div>
    <ul class="sidebar-nav">
      <li>
        <a th:href="@{/patient/dashboard}" th:classappend="${active == 'dashboard'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
      </li>
      <li>
        <a th:href="@{/patient/book}" th:classappend="${active == 'book'} ? ' active' : ''">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Book Appointment
        </a>
      </li>
      <li>
  <a th:href="@{/patient/prescriptions}" 
     th:classappend="${active == 'prescriptions'} ? ' active' : ''">
    
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
               a1 1 0 01.707.293l5.414 5.414A1 1 0 0120 9.414V19a2 2 0 01-2 2z"/>
    </svg>
    
    My Prescriptions
  </a>
</li>
    </ul>
  </div>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar">P</div>
      <div class="sidebar-user-info">
        <div class="sidebar-username" sec:authentication="name">Patient</div>
        <div class="sidebar-role">Patient</div>
      </div>
      <a th:href="@{/logout}" class="sidebar-logout" title="Sign out">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </a>
    </div>
  </div>
</div>

</body>
</html>
