<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Patient Prescriptions — MedCare HMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <style>
    /* ── Prescription timeline card ──────────────────────────── */
    .rx-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-xs);
      position: relative;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .rx-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .rx-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--teal);
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .rx-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .rx-date {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .rx-diagnosis {
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .rx-section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .rx-medicines {
      font-size: 0.88rem;
      color: var(--text-primary);
      white-space: pre-wrap;
      background: var(--surface-2);
      border-left: 3px solid var(--teal);
      padding: 10px 14px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      line-height: 1.6;
    }
    .rx-instructions {
      font-size: 0.84rem;
      color: var(--text-secondary);
      font-style: italic;
      white-space: pre-wrap;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="layout">

  <div th:replace="~{fragments/sidebar :: doctor('dashboard')}"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">
         <h2 th:text="|${patient.name}'s Prescriptions|"></h2>
          <p>All prescriptions you have written for this patient</p>
        </div>
      </div>
      <div class="topbar-actions">
        <a th:href="@{/doctor/dashboard}" class="btn btn-outline btn-sm">← Back to Dashboard</a>
      </div>
    </div>

    <div class="content">

      <!-- Patient Profile Banner -->
      <div class="profile-card" style="margin-bottom:28px;">
        <div class="profile-avatar-lg"
             th:text="${#strings.toUpperCase(#strings.substring(patient.name,0,1))}">P</div>
        <div class="profile-info">
          <h2 th:text="${patient.name}">Patient Name</h2>
          <p th:text="'Age ' + ${patient.age} + '  ·  ' + ${patient.gender} + '  ·  ' + ${patient.phone}">Details</p>
        </div>
      </div>

      <!-- Prescription List -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">Prescription History</h2>
          <span class="badge"
                style="background:var(--teal-light);color:var(--teal-dark);"
                th:text="${#lists.size(prescriptions)} + ' record(s)'"></span>
        </div>

        <!-- Empty State -->
        <div th:if="${#lists.isEmpty(prescriptions)}" class="card">
          <div class="empty-state">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <h3>No prescriptions yet</h3>
            <p>You haven't written any prescriptions for this patient.</p>
          </div>
        </div>

        <!-- Prescription Cards -->
        <div th:if="${not #lists.isEmpty(prescriptions)}">
          <div class="rx-card" th:each="rx : ${prescriptions}">
            <div class="rx-header">
              <div class="rx-date"
                   th:text="${#temporals.format(rx.prescribedDate, 'dd MMM yyyy')}">Date</div>
              <span class="badge" style="background:var(--teal-light);color:var(--teal-dark);">Rx</span>
            </div>

            <div class="rx-diagnosis"
                 th:text="${rx.diagnosis != null and !#strings.isEmpty(rx.diagnosis) ? rx.diagnosis : 'No diagnosis noted'}">
              Diagnosis
            </div>

            <div class="rx-section-label">Medicines</div>
            <div class="rx-medicines" th:text="${rx.medicines}">—</div>

            <div th:if="${rx.instructions != null and !#strings.isEmpty(rx.instructions)}">
              <div class="rx-section-label">Instructions</div>
              <div class="rx-instructions" th:text="${rx.instructions}">—</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
