<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Prescriptions — MedCare HMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <div th:replace="~{fragments/sidebar :: doctor('prescriptions')}">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </div>
      <span>MedCare HMS</span>
    </div>
    <nav class="sidebar-nav">
      <a th:href="@{/doctor/dashboard}" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a th:href="@{/doctor/prescriptions}" class="nav-item active">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0120 9.414V19a2 2 0 01-2 2z"/></svg>
        Prescriptions
      </a>
      <a th:href="@{/doctor/slots}" class="nav-item">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg>
        Time Slots
      </a>
    </nav>
    <form th:action="@{/logout}" method="post" style="margin-top:auto;padding:16px;">
      <button type="submit" class="btn btn-ghost" style="width:100%;justify-content:flex-start;gap:10px;color:var(--text-muted);">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </button>
    </form>
  </div>

  <!-- Main Content -->
  <main class="content">
    <div class="content-header">
      <div>
        <h1 class="content-title">Prescriptions Issued</h1>
        <p class="content-subtitle">All prescriptions you have written for your patients.</p>
      </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(prescriptions)}" class="empty-state">
      <div class="empty-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0120 9.414V19a2 2 0 01-2 2z"/></svg>
      </div>
      <h3>No Prescriptions Yet</h3>
      <p>Go to your dashboard and add a prescription for an approved appointment.</p>
      <a th:href="@{/doctor/dashboard}" class="btn btn-primary">Go to Dashboard</a>
    </div>

    <!-- Prescriptions table -->
    <div th:unless="${#lists.isEmpty(prescriptions)}" class="card" style="padding:0;overflow:hidden;">
      <table style="width:100%;border-collapse:collapse;">
        <thead>
          <tr style="background:var(--surface-2);border-bottom:1px solid var(--border);">
            <th style="padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);">#</th>
            <th style="padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);">Patient</th>
            <th style="padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);">Diagnosis</th>
            <th style="padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);">Issued Date</th>
            <th style="padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="rx, stat : ${prescriptions}"
              style="border-bottom:1px solid var(--border);transition:background var(--transition);"
              onmouseover="this.style.background='var(--surface-2)'"
              onmouseout="this.style.background=''">
            <td style="padding:14px 16px;font-size:0.85rem;color:var(--text-muted);" th:text="${stat.count}"></td>
            <td style="padding:14px 16px;">
              <span style="font-weight:600;font-size:0.88rem;color:var(--text-primary);" th:text="${rx.appointment.patient.name}"></span>
            </td>
            <td style="padding:14px 16px;font-size:0.85rem;color:var(--text-secondary);" th:text="${rx.diagnosis}"></td>
            <td style="padding:14px 16px;font-size:0.85rem;color:var(--text-secondary);" th:text="${rx.issuedDate}"></td>
            <td style="padding:14px 16px;">
              <a th:href="@{/doctor/prescription/add/{id}(id=${rx.appointment.id})}"
                 class="btn btn-ghost" style="font-size:0.8rem;padding:6px 12px;">Edit</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>
