<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Dashboard — MedCare HMS</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="layout">

  <div th:replace="~{fragments/sidebar :: doctor('dashboard')}"></div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">
          <h1>Doctor Dashboard</h1>
          <p th:text="'Welcome back, Dr. ' + ${doctor != null ? doctor.name : ''}">Welcome back</p>
        </div>
      </div>
      <div class="topbar-actions">
        <a th:href="@{/doctor/slots}" class="btn btn-teal btn-sm">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          Manage Slots
        </a>
      </div>
    </div>

    <div class="content">

      <div th:if="${error}" class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error}"></span>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon teal">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" th:text="${totalCount}">0</div>
            <div class="stat-label">Total Appointments</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon amber">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" th:text="${pendingCount}">0</div>
            <div class="stat-label">Awaiting Action</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="stat-body">
            <div class="stat-value" th:text="${approvedCount}">0</div>
            <div class="stat-label">Approved</div>
          </div>
        </div>
      </div>

      <!-- Appointments -->
      <div class="section">
        <div class="section-header">
          <h2 class="section-title">My Appointments</h2>
          <span th:if="${pendingCount > 0}" class="badge badge-pending" th:text="${pendingCount} + ' need action'"></span>
        </div>

        <div th:if="${#lists.isEmpty(appointments)}" class="card">
          <div class="empty-state">
            <div class="empty-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
            <h3>No appointments yet</h3>
            <p>Patient appointments will appear here once booked.</p>
          </div>
        </div>

        <div class="card-grid" th:if="${not #lists.isEmpty(appointments)}">
          <div class="appt-card" th:each="a : ${appointments}">
            <div class="appt-card-header">
              <div>
                <div class="appt-avatar"
                     th:text="${a.patient != null ? #strings.toUpperCase(#strings.substring(a.patient.name,0,1)) : 'P'}">P</div>
                <div class="appt-doctor-name"
                     th:text="${a.patient != null ? a.patient.name : 'Unknown Patient'}">Patient</div>
                <div class="appt-patient-sub"
                     th:text="'Age: ' + (${a.patient != null ? a.patient.age : '-'}) + '  ·  ' + (${a.patient != null ? a.patient.gender : '-'})"></div>
              </div>
              <span th:class="'badge badge-' + ${a.status.name().toLowerCase()}"
                    th:text="${a.status}">STATUS</span>
            </div>

            <div class="appt-divider"></div>

            <div class="appt-meta">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3M3 11h18M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <span th:text="${#temporals.format(a.appointmentDate, 'dd MMM yyyy, hh:mm a')}">Date</span>
            </div>

            <div class="appt-notes"
                 th:if="${a.notes != null and !#strings.isEmpty(a.notes)}"
                 th:text="${a.notes}">Notes</div>

            <div class="appt-actions" th:if="${a.status.name() == 'PENDING'}">
              <form th:action="@{/doctor/appointment/{id}/status(id=${a.id})}" method="post">
                <input type="hidden" name="status" value="APPROVED"/>
                <button type="submit" class="btn btn-success btn-sm">✔ Approve</button>
              </form>
              <form th:action="@{/doctor/appointment/{id}/status(id=${a.id})}" method="post">
                <input type="hidden" name="status" value="REJECTED"/>
                <button type="submit" class="btn btn-danger btn-sm">✘ Reject</button>
              </form>
            </div>
            
              <div style="margin-top:10px;">
    <a th:href="@{/doctor/prescription/add/{id}(id=${a.id})}"
       class="btn btn-ghost btn-sm">
       Add / Edit Prescription
    </a>
  </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
